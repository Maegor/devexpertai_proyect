<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal · DevExpert AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg: #0f1117;
            --bg-card: #181b26;
            --bg-hover: #1e2235;
            --border: #252840;
            --accent: #e8651a;
            --accent-dim: rgba(232, 101, 26, 0.12);
            --text: #e8eaf0;
            --text-muted: #7c8099;
            --text-dim: #4a4d66;
            --nav-h: 52px;
            --sidebar-w: 220px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            min-height: 100vh;
        }

        /* ── Top nav ── */
        .topnav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            gap: 0;
            z-index: 200;
        }

        .topnav-brand { font-size: 1rem; font-weight: 700; color: var(--text); white-space: nowrap; margin-right: 2rem; }
        .topnav-brand em { color: var(--accent); font-style: normal; }

        .topnav-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-left: auto;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .btn-logout {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.75rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 0.775rem;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.15s, color 0.15s;
        }
        .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

        /* ── Layout ── */
        .page-body {
            margin-top: var(--nav-h);
            min-height: calc(100vh - var(--nav-h));
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 1.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            padding: 0.5rem 1.25rem 0.25rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.55rem 1.25rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            border-left: 3px solid transparent;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
        .sidebar-item.active {
            background: var(--accent-dim);
            color: var(--accent);
            border-left-color: var(--accent);
        }
        .sidebar-item i { font-size: 1rem; width: 1.1rem; text-align: center; }

        /* ── Content area ── */
        .content-area {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            min-width: 0;
        }

        /* ── Spinner ── */
        #section-spinner {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 3rem 0;
            opacity: 0;
            transition: opacity 200ms;
        }
        .htmx-request #section-spinner { opacity: 1; }
    </style>
</head>
<body>

    <header class="topnav">
        <div class="topnav-brand"><em>DevExpert</em> AI</div>
        <span style="color: var(--text-dim); font-size: 0.75rem; margin-right: auto;">Partner Portal</span>
        <div class="topnav-right">
            <i class="bi bi-person-circle"></i>
            <span>{{ partner_name }}</span>
            <a href="/partners/logout" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i>Sign out
            </a>
        </div>
    </header>

    <div class="page-body">
        <!-- Sidebar -->
        <nav class="sidebar">
            <span class="sidebar-label">My Account</span>
            <button class="sidebar-item active" id="nav-profile"
                    hx-get="/partners/dashboard/profile"
                    hx-target="#content-area"
                    hx-swap="innerHTML"
                    hx-indicator="#section-spinner"
                    onclick="setNav(this)">
                <i class="bi bi-person-lines-fill"></i>Personal Data
            </button>
            <button class="sidebar-item" id="nav-invoices"
                    hx-get="/partners/dashboard/invoices"
                    hx-target="#content-area"
                    hx-swap="innerHTML"
                    hx-indicator="#section-spinner"
                    onclick="setNav(this)">
                <i class="bi bi-receipt"></i>Invoices
            </button>
        </nav>

        <!-- Main content -->
        <main class="content-area">
            <div id="section-spinner">
                <span class="spinner-border spinner-border-sm"></span> Loading...
            </div>
            <div id="content-area"
                 hx-get="/partners/dashboard/profile"
                 hx-trigger="load"
                 hx-swap="innerHTML"></div>
        </main>
    </div>

    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script>
        function setNav(el) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // When clicking a sidebar item, hide the invoice detail back button if present
        document.body.addEventListener('htmx:afterSwap', function (e) {
            if (e.target.id === 'content-area') {
                // Reattach click handler for invoice rows if needed
            }
        });
    </script>
</body>
</html>
