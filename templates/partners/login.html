<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal · DevExpert AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-primary: #1a1b2e;
            --bg-secondary: #252638;
            --bg-input: #2d2f45;
            --accent: #e8651a;
            --accent-hover: #cf5712;
            --text-primary: #ffffff;
            --text-muted: #a0a3b1;
            --border-input: #3a3d56;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .brand { text-align: center; margin-bottom: 2rem; }

        .brand-name { font-size: 1.6rem; font-weight: 700; }
        .brand-name span { color: var(--accent); }

        .portal-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            border: 1px solid var(--border-input);
            border-radius: 20px;
            padding: 0.15rem 0.75rem;
            margin-top: 0.4rem;
        }

        .form-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.35rem;
        }

        .form-control {
            background-color: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
        }

        .form-control:focus {
            background-color: var(--bg-input);
            border-color: var(--accent);
            color: var(--text-primary);
            box-shadow: none;
        }

        .form-control::placeholder { color: #5a5d78; }

        .btn-login {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
            border-radius: 8px;
            padding: 0.7rem;
            width: 100%;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fff;
        }

        .alert-error {
            background-color: rgba(232, 84, 84, 0.12);
            border: 1px solid rgba(232, 84, 84, 0.3);
            color: #f08080;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
        }

        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request .btn-text { display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="brand-name"><span>DevExpert</span> AI</div>
            <span class="portal-badge">Partner Portal</span>
        </div>

        {% if error %}
        <div class="alert-error">
            <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post" action="/partners/login"
              hx-post="/partners/login"
              hx-target="body"
              hx-push-url="true"
              hx-indicator="#login-btn">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email"
                       class="form-control" placeholder="your@email.com"
                       required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="••••••••"
                       required>
            </div>
            <button type="submit" id="login-btn" class="btn btn-login">
                <span class="btn-text">Sign in</span>
                <span class="htmx-indicator">
                    <span class="spinner-border spinner-border-sm" role="status"></span>
                    Verifying...
                </span>
            </button>
        </form>
    </div>

    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
</body>
</html>
